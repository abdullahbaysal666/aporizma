<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="ui.css"></head>
<body style="max-width:560px">
<h1><span class="mark">⬡</span> Aporizma Translate — Settings</h1>
<label for="key">Gemini API key (stored only on this device)</label>
<input type="password" id="key" placeholder="AIza...">
<p class="note">Get a free key at
  <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a>
  — the free tier is plenty for personal translation use. Your key and your text
  go directly from your browser to Google. Aporizma has no server and sees nothing.</p>
<label for="model">Model</label>
<select id="model">
  <option value="gemini-2.5-flash">gemini-2.5-flash (best quality)</option>
  <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (faster, bigger free quota)</option>
</select>
<div class="row"><button id="save">Save</button><span class="note" id="saved"></span></div>
<script src="options.js"></script>
</body>
</html>
