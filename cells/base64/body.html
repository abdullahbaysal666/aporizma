<h1>{{s.h1}}</h1>
<p class="lede">{{s.lede}}</p>
<div class="card stack">
  <textarea id="input" rows="7" placeholder="{{s.input_ph}}" spellcheck="false"
    style="font-family:ui-monospace,Consolas,monospace;font-size:.95rem"></textarea>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button class="btn" id="encode">{{s.encode}}</button>
    <button class="btn" id="decode">{{s.decode}}</button>
    <label class="note"><input type="checkbox" id="urlsafe"> {{s.url_label}}</label>
    <button class="btn" id="copy" hidden>{{s.copy}}</button>
  </div>
  <p class="note" id="status">{{s.empty}}</p>
  <textarea id="output" rows="7" readonly spellcheck="false"
    style="font-family:ui-monospace,Consolas,monospace;font-size:.95rem"></textarea>
</div>
<section>{{s.faq_html}}</section>
