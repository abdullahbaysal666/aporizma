<h1>{{s.h1}}</h1>
<p class="lede">{{s.lede}}</p>
<div class="card stack">
  <div class="dropzone" id="drop">{{s.drop}}</div>
  <input type="file" id="file" accept="image/*" hidden>
  <p class="note" id="status">{{s.empty}}</p>
  <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:end">
    <div><label class="note" for="maxw">{{s.maxw_label}}</label>
      <select id="maxw" style="width:auto">
        <option value="640">640</option>
        <option value="1080">1080</option>
        <option value="1600" selected>1600</option>
        <option value="1920">1920</option>
        <option value="2560">2560</option>
      </select></div>
    <div><label class="note" for="quality">{{s.quality_label}}: <span id="qval">80</span>%</label><br>
      <input type="range" id="quality" min="30" max="95" value="80" style="width:160px"></div>
    <div><label class="note" for="format">{{s.format_label}}</label>
      <select id="format" style="width:auto">
        <option value="image/webp" selected>WebP</option>
        <option value="image/jpeg">JPEG</option>
      </select></div>
    <button class="btn" id="go" disabled>{{s.resize}}</button>
    <button class="btn" id="download" hidden>{{s.download}}</button>
  </div>
  <div style="display:flex;justify-content:center;padding:8px">
    <canvas id="preview" style="max-width:min(340px,100%);height:auto;border-radius:8px;display:none"></canvas>
  </div>
</div>
<section>{{s.faq_html}}</section>
