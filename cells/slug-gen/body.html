<h1>{{s.h1}}</h1>
<p class="lede">{{s.lede}}</p>
<div class="card stack">
  <label class="note" for="input">{{s.input_label}}</label>
  <input type="text" id="input" placeholder="{{s.input_ph}}" spellcheck="false">
  <label class="note" for="maxlen">{{s.maxlen_label}}</label>
  <input type="number" id="maxlen" value="0" min="0" style="max-width:120px">
  <label class="note" for="output">{{s.output_label}}</label>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <input type="text" id="output" readonly spellcheck="false"
           style="flex:1;min-width:200px;font-family:var(--mono)">
    <button class="btn ghost" id="copy" hidden>{{s.copy}}</button>
  </div>
  <p class="note" id="count"></p>
</div>
<section>{{s.faq_html}}</section>
