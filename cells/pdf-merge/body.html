<h1>{{s.h1}}</h1>
<p class="lede">{{s.lede}}</p>
<div class="card stack">
  <div class="dropzone" id="drop">{{s.drop}}</div>
  <input type="file" id="file" accept="application/pdf,.pdf" multiple hidden>
  <label class="note" id="listLabel" hidden>{{s.files_label}}</label>
  <ul id="list" style="list-style:none;padding:0;margin:0"></ul>
  <p class="note" id="status">{{s.empty}}</p>
  <div>
    <button class="btn" id="merge" disabled>{{s.merge}}</button>
    <button class="btn" id="download" hidden>{{s.download}}</button>
  </div>
</div>
<section>{{s.faq_html}}</section>
<style>
#list li { border-top: 1px solid var(--line); padding: 8px 4px; display: flex; align-items: center; gap: 8px; }
#list .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#list .meta { color: var(--ink-soft); font-size: .82rem; white-space: nowrap; }
#list button { padding: 4px 10px; }
</style>
